<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDR FM Radio</title>
    <style>
      :root {
        --bg1: #07203a;
        --bg2: #0b3f47;
        --panel: rgba(255, 255, 255, 0.12);
        --text: #f2fbff;
        --accent: #ffd166;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #1e8f8f, transparent 38%),
          linear-gradient(130deg, var(--bg1), var(--bg2));
        display: grid;
        place-items: center;
      }
      .card {
        width: min(620px, 94vw);
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        padding: 22px;
        backdrop-filter: blur(6px);
      }
      h1 { margin: 0 0 14px; font-size: 1.7rem; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      label { display: block; font-size: 0.9rem; margin-bottom: 6px; }
      input, select, button {
        width: 100%; border: 0; border-radius: 10px; padding: 10px; font-size: 1rem;
      }
      button { cursor: pointer; font-weight: 700; }
      #startBtn { background: var(--accent); color: #2b1c00; }
      #stopBtn { background: #f25f5c; color: white; }
      .status { margin-top: 14px; font-size: 0.95rem; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Simple FM Receiver</h1>
      <div class="row">
        <div>
          <label for="device">SDR Device</label>
          <select id="device"></select>
        </div>
        <div>
          <label for="freq">Frequency (MHz)</label>
          <input id="freq" type="number" min="76" max="108" step="0.1" value="92.1" />
        </div>
      </div>
      <div class="row" style="margin-top: 10px;">
        <button id="startBtn">Start</button>
        <button id="stopBtn">Stop</button>
      </div>
      <div class="status" id="status">Idle.</div>
      <div class="status mono" id="queue"></div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const queueEl = document.getElementById("queue");
      const deviceEl = document.getElementById("device");
      const freqEl = document.getElementById("freq");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");

      let running = false;
      let audioCtx = null;
      let playCursor = 0;
      let bufferedStarts = 0;

      function setStatus(msg) { statusEl.textContent = msg; }

      async function loadDevices() {
        const resp = await fetch("/api/devices");
        const devices = await resp.json();
        deviceEl.innerHTML = "";
        for (const d of devices) {
          const opt = document.createElement("option");
          opt.value = d.id;
          opt.textContent = `${d.id} (${d.driver || "unknown"})`;
          deviceEl.appendChild(opt);
        }
        if (!devices.length) setStatus("No SDR devices found via sdr-gateway.");
      }

      function ensureAudio() {
        if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 48000 });
        if (audioCtx.state === "suspended") return audioCtx.resume();
        if (playCursor < audioCtx.currentTime + 0.25) playCursor = audioCtx.currentTime + 0.25;
        return Promise.resolve();
      }

      function schedulePcm16(arrayBuffer) {
        const pcm = new Int16Array(arrayBuffer);
        if (!pcm.length) return;
        const f32 = new Float32Array(pcm.length);
        for (let i = 0; i < pcm.length; i++) f32[i] = pcm[i] / 32768.0;

        const buf = audioCtx.createBuffer(1, f32.length, 48000);
        buf.copyToChannel(f32, 0, 0);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);

        const startAt = Math.max(playCursor, audioCtx.currentTime + 0.02);
        src.start(startAt);
        playCursor = startAt + buf.duration;
      }

      async function audioLoop() {
        while (running) {
          try {
            const resp = await fetch("/api/audio/batch?count=6&timeout=0.4", { cache: "no-store" });
            if (resp.status === 204) continue;
            if (!resp.ok) throw new Error(`audio fetch failed (${resp.status})`);
            schedulePcm16(await resp.arrayBuffer());
            bufferedStarts += 1;

            // If we drift too far ahead, drop buffered latency and re-lock near real-time.
            const lead = playCursor - audioCtx.currentTime;
            if (lead > 1.0) {
              playCursor = audioCtx.currentTime + 0.3;
            }
          } catch (err) {
            setStatus(`Audio loop error: ${err.message}`);
            await new Promise((r) => setTimeout(r, 80));
          }
        }
      }

      async function statusLoop() {
        while (true) {
          try {
            const resp = await fetch("/api/radio/status", { cache: "no-store" });
            const s = await resp.json();
            queueEl.textContent = `running=${s.running} worker=${s.worker_alive} stream=${s.stream_id || "-"} queue=${s.queued_chunks} produced=${s.produced_chunks} served=${s.served_chunks} rms=${Number(s.last_audio_rms || 0).toFixed(4)} err=${s.worker_error || "-"}`;
          } catch (_) {}
          await new Promise((r) => setTimeout(r, 1000));
        }
      }

      startBtn.onclick = async () => {
        try {
          await ensureAudio();
          const payload = {
            device_id: deviceEl.value,
            freq_mhz: Number(freqEl.value),
            sample_rate_sps: 2000000,
          };
          const resp = await fetch("/api/radio/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || data.error || "start failed");
          running = true;
          bufferedStarts = 0;
          setStatus(`Streaming FM at ${payload.freq_mhz.toFixed(1)} MHz (${data.sample_rate_sps} sps)`);
          audioLoop();
        } catch (err) {
          setStatus(`Start failed: ${err.message}`);
        }
      };

      stopBtn.onclick = async () => {
        running = false;
        await fetch("/api/radio/stop", { method: "POST" });
        setStatus("Stopped.");
      };

      loadDevices();
      statusLoop();
    </script>
  </body>
</html>
