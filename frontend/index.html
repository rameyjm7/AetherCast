<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AetherCast</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" />
    <style>
      :root {
        --bg1: #101417;
        --bg2: #24292e;
        --shell: rgba(26, 29, 32, 0.82);
        --surface: rgba(20, 24, 27, 0.82);
        --surface-raised: rgba(30, 35, 40, 0.78);
        --surface-soft: rgba(255, 255, 255, 0.055);
        --line: rgba(255, 255, 255, 0.11);
        --line-strong: rgba(255, 255, 255, 0.17);
        --text: rgba(245, 247, 250, 0.94);
        --muted: rgba(245, 247, 250, 0.58);
        --quiet: rgba(245, 247, 250, 0.38);
        --accent: #6bb6ff;
        --accent-strong: #0a84ff;
        --active: #30d158;
        --danger: #ff453a;
        --ring: rgba(107, 182, 255, 0.24);
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 12%, rgba(77, 163, 255, 0.16), transparent 34%),
          radial-gradient(circle at 86% 8%, rgba(255, 255, 255, 0.18), transparent 28%),
          radial-gradient(circle at 72% 92%, rgba(48, 209, 88, 0.08), transparent 30%),
          linear-gradient(155deg, var(--bg1), var(--bg2));
        display: grid;
        place-items: center;
        padding: 18px 0;
      }
      .card {
        width: min(860px, 95vw);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
          var(--shell);
        border: 1px solid var(--line-strong);
        border-radius: 30px;
        padding: 18px;
        backdrop-filter: blur(24px) saturate(150%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 30px 80px rgba(0, 0, 0, 0.34);
      }
      .control-bar {
        margin-bottom: 14px;
        padding: 10px 10px 10px 14px;
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(77, 163, 255, 0.11), rgba(77, 163, 255, 0.035)),
          var(--surface-raised);
        border: 1px solid var(--line);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.09),
          0 12px 32px rgba(0, 0, 0, 0.18);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }
      .top-status {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
      }
      .top-pill {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.82rem;
        white-space: nowrap;
        opacity: 0.48;
        transition: opacity 140ms ease, color 140ms ease, border-color 140ms ease, background 140ms ease;
      }
      .top-pill.active {
        opacity: 0.88;
        color: var(--text);
        background: rgba(107, 182, 255, 0.1);
        border-color: rgba(107, 182, 255, 0.22);
      }
      .top-pill.locked {
        opacity: 1;
        color: #ebfff0;
        background: rgba(48, 209, 88, 0.16);
        border-color: rgba(48, 209, 88, 0.38);
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .controls-head {
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .playback-strip {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
      }
      .controls-head-label {
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--quiet);
      }
      .bar-title {
        display: grid;
        gap: 2px;
      }
      .bar-kicker {
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--quiet);
      }
      .bar-name {
        font-size: 1rem;
        font-weight: 650;
      }
      .top {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 18px;
        align-items: stretch;
      }
      .now {
        border-radius: 22px;
        padding: 20px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
      }
      .now-content {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .dial-panel {
        position: relative;
        overflow: hidden;
        border-radius: 14px;
        padding: 13px 16px 12px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
          radial-gradient(circle at 24% 8%, rgba(147, 197, 253, 0.34), transparent 34%),
          linear-gradient(180deg, #174c82 0%, #0d2b52 54%, #07182f 100%);
        background-size: 100% 5px, auto, auto;
        border: 1px solid rgba(147, 197, 253, 0.46);
        box-shadow:
          inset 0 2px 10px rgba(0, 0, 0, 0.62),
          inset 0 -1px 0 rgba(191, 219, 254, 0.22),
          0 8px 24px rgba(59, 130, 246, 0.12);
      }
      .dial-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(100deg, transparent 0 38%, rgba(255, 255, 255, 0.12) 48%, transparent 60% 100%);
        mix-blend-mode: screen;
        opacity: 0.35;
      }
      .dial {
        position: relative;
        z-index: 1;
        display: inline-block;
        font-family: "Courier New", "SF Mono", ui-monospace, monospace;
        font-size: clamp(2.25rem, 5.2vw, 4.2rem);
        line-height: 0.94;
        letter-spacing: 0.08em;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: #e8f3ff;
        text-shadow:
          0 0 4px rgba(232, 243, 255, 0.84),
          0 0 14px rgba(125, 211, 252, 0.58),
          0 0 26px rgba(59, 130, 246, 0.35);
      }
      .dial-unit {
        font-size: 0.34em;
        letter-spacing: 0.06em;
        vertical-align: 0.18em;
      }
      .controls {
        border-radius: 22px;
        padding: 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      label { display: block; font-size: 0.72rem; margin-bottom: 8px; color: var(--quiet); text-transform: uppercase; letter-spacing: 0.1em; }
      input, select, button {
        width: 100%; border: 1px solid var(--line-strong); border-radius: 12px; padding: 11px 12px; font-size: 1rem;
        box-sizing: border-box;
      }
      input, select {
        background: rgba(4, 8, 12, 0.34);
        color: var(--text);
      }
      input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--ring);
      }
      input[type="range"] {
        accent-color: var(--accent);
      }
      button { cursor: pointer; font-weight: 600; }
      .transport {
        display: grid;
        grid-template-columns: 44px 54px 44px;
        gap: 8px;
        align-items: center;
        flex: 0 0 auto;
      }
      .transport button {
        height: 38px;
        display: inline-grid;
        place-items: center;
        border-color: transparent;
        color: white;
        font-size: 1rem;
        line-height: 1;
      }
      .material-symbols-rounded {
        font-family: "Material Symbols Rounded";
        font-weight: normal;
        font-style: normal;
        font-size: 22px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        direction: ltr;
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
        font-feature-settings: "liga";
      }
      .skipBtn {
        background: rgba(255, 255, 255, 0.08);
      }
      #toggleBtn {
        width: 54px;
        height: 38px;
        display: inline-grid;
        place-items: center;
        background: var(--accent-strong);
        color: white;
        border-color: transparent;
        font-size: 1.12rem;
        line-height: 1;
      }
      #toggleBtn.stop { background: var(--active); }
      .metrics {
        margin-top: 14px;
        padding: 12px;
        border-radius: 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .audio-tools {
        margin-top: 12px;
        padding: 14px;
        border-radius: 20px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
      }
      .vol-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
      }
      .vol-row.compact {
        flex: 1 1 auto;
        min-width: 180px;
      }
      .vol-row.compact label {
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .vol-row label,
      .gain-row label {
        margin: 0;
        font-size: 0.78rem;
      }
      .gain-grid {
        margin-top: 12px;
        display: grid;
        gap: 6px;
      }
      .gain-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 8px;
      }
      #volumeValue,
      .gain-value {
        font-size: 0.86rem;
        color: var(--muted);
        min-width: 40px;
        text-align: right;
      }
      #miniSpec {
        margin-top: 0;
        width: 100%;
        height: 72px;
        border-radius: 14px;
        display: block;
        background: #07111f;
        border: 1px solid rgba(107, 182, 255, 0.18);
      }
      .mode-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 0.84rem;
      }
      .mode-row label {
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: var(--text);
        font-size: 0.9rem;
        letter-spacing: 0;
        text-transform: none;
      }
      .mode-row input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }
      .advanced-row {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }
      .advanced-row label {
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: var(--text);
        font-size: 0.88rem;
        letter-spacing: 0;
        text-transform: none;
      }
      .advanced-row input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }
      .advanced-panel {
        display: none;
      }
      .advanced-panel.visible {
        display: block;
      }
      .history {
        padding: 14px;
        border-radius: 20px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
      }
      .history h3 {
        margin: 0 0 8px;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        color: var(--quiet);
        text-transform: uppercase;
      }
      #historyList {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 6px;
      }
      #historyList li {
        padding: 9px 11px;
        border-radius: 12px;
        border: 1px solid var(--line);
        font-size: 0.95rem;
        cursor: pointer;
        user-select: none;
        background: rgba(255, 255, 255, 0.035);
        color: var(--text);
      }
      #historyList li:hover {
        border-color: var(--accent);
        background: rgba(107, 182, 255, 0.08);
      }
      #historyList li.active {
        border-color: var(--accent);
        background: rgba(10, 132, 255, 0.2);
        color: var(--text);
        font-weight: 650;
      }
      #historyList li.disabled {
        cursor: wait;
        opacity: 0.58;
      }
      .bottom-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .rds-card {
        margin-top: 0;
        padding: 12px;
        min-height: 96px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid var(--line);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
        display: flex;
        align-items: center;
      }
      .rds-card h3 {
        margin: 0 0 8px;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        color: var(--quiet);
        text-transform: uppercase;
      }
      #rds {
        margin: 0;
        padding: 0;
        width: 100%;
        font-size: 0.92rem;
      }
      .rds-card.locking {
        border-color: rgba(107, 182, 255, 0.28);
      }
      .rds-card.locked {
        border-color: rgba(48, 209, 88, 0.34);
      }
      .rds-main {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
      }
      .rds-station {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.96rem;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: none;
      }
      .rds-sub {
        margin-top: 4px;
        color: var(--muted);
        min-height: 1.2em;
      }
      .rds-meta {
        margin-top: 6px;
        font-size: 0.82rem;
        color: var(--muted);
      }
      .rds-debug {
        margin-top: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.76rem;
        color: var(--muted);
        overflow-wrap: anywhere;
      }
      @media (max-width: 860px) {
        .top { grid-template-columns: 1fr; }
        .bottom-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 700px) {
        .control-bar {
          align-items: stretch;
          flex-direction: column;
        }
        .top-status {
          justify-content: flex-start;
        }
        .controls-head {
          flex-direction: column;
          align-items: stretch;
        }
        .playback-strip {
          flex-direction: column;
          align-items: stretch;
        }
        .transport {
          width: 100%;
          grid-template-columns: 1fr 1.2fr 1fr;
        }
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="control-bar">
        <div class="bar-title">
          <span class="bar-kicker">AetherCast</span>
          <span class="bar-name">Local FM, streamed</span>
        </div>
        <div class="top-status">
          <div class="top-pill" id="statusFm">FM</div>
          <div class="top-pill" id="statusRds">RDS</div>
          <div class="top-pill" id="statusStereo">Mono</div>
        </div>
      </div>
      <div class="top">
        <div class="now">
          <div class="now-content">
            <div class="rds-card" id="rdsCard">
              <div id="rds">RDS: waiting...</div>
            </div>
            <div class="dial-panel">
              <div class="dial"><span id="dialFreq">92.1</span><span class="dial-unit"> MHz</span></div>
            </div>
          </div>
        </div>
        <div class="controls">
          <div class="controls-head">
            <div class="playback-strip">
              <div class="transport">
                <button class="skipBtn" id="prevStationBtn" type="button" aria-label="Previous station" title="Previous station"><span class="material-symbols-rounded">skip_previous</span></button>
                <button id="toggleBtn" aria-label="Start listening" title="Start listening"><span class="material-symbols-rounded">play_arrow</span></button>
                <button class="skipBtn" id="nextStationBtn" type="button" aria-label="Next station" title="Next station"><span class="material-symbols-rounded">skip_next</span></button>
              </div>
              <div class="vol-row compact">
                <label for="volume">Volume</label>
                <input id="volume" type="range" min="0" max="1.2" step="0.01" value="0.85" />
                <span id="volumeValue">85%</span>
              </div>
            </div>
          </div>
          <div class="row">
            <div>
              <label for="device">SDR Device</label>
              <select id="device"></select>
            </div>
            <div>
              <label for="freq">Frequency (MHz)</label>
              <input id="freq" type="number" min="87.5" max="108" step="0.1" value="92.1" />
            </div>
          </div>
          <div class="advanced-row">
            <label for="advancedMode">
              <input id="advancedMode" type="checkbox" />
              Advanced
            </label>
          </div>
          <div class="advanced-panel" id="advancedPanel">
            <div class="gain-grid">
              <div class="gain-row">
                <label for="rxGain">Gain</label>
                <input id="rxGain" type="range" min="0" max="102" step="2" value="72" />
                <span class="gain-value" id="rxGainValue">72 dB</span>
              </div>
            </div>
            <div class="mode-row">
              <label for="stereoMode">
                <input id="stereoMode" type="checkbox" />
                Stereo decode
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="audio-tools">
        <canvas id="miniSpec" width="800" height="72"></canvas>
      </div>
      <div class="bottom-grid">
        <div class="history">
          <h3>Recent Channels</h3>
          <ul id="historyList"></ul>
        </div>
      </div>
    </div>
    <div class="sr-only" id="status" aria-live="polite">Idle.</div>

    <script>
      const statusEl = document.getElementById("status");
      const rdsCardEl = document.getElementById("rdsCard");
      const rdsEl = document.getElementById("rds");
      const deviceEl = document.getElementById("device");
      const freqEl = document.getElementById("freq");
      const dialFreqEl = document.getElementById("dialFreq");
      const toggleBtn = document.getElementById("toggleBtn");
      const prevStationBtn = document.getElementById("prevStationBtn");
      const nextStationBtn = document.getElementById("nextStationBtn");
      const historyListEl = document.getElementById("historyList");
      const volumeEl = document.getElementById("volume");
      const volumeValueEl = document.getElementById("volumeValue");
      const advancedModeEl = document.getElementById("advancedMode");
      const advancedPanelEl = document.getElementById("advancedPanel");
      const rxGainEl = document.getElementById("rxGain");
      const rxGainValueEl = document.getElementById("rxGainValue");
      const statusFmEl = document.getElementById("statusFm");
      const statusRdsEl = document.getElementById("statusRds");
      const stereoModeEl = document.getElementById("stereoMode");
      const statusStereoEl = document.getElementById("statusStereo");
      const specCanvas = document.getElementById("miniSpec");
      const specCtx = specCanvas.getContext("2d");

      let running = false;
      let audioCtx = null;
      let gainNode = null;
      let playCursor = 0;
      let bufferedStarts = 0;
      let audioLoopActive = false;
      let resumePending = false;
      let retuning = false;
      let activeFreq = null;
      const HISTORY_KEY = "fm_channel_history_v1";
      const RESUME_KEY = "fm_was_playing_v1";
      const VOLUME_KEY = "fm_volume_v1";
      const STEREO_KEY = "fm_stereo_enabled_v1";
      const ADVANCED_KEY = "fm_advanced_mode_v1";
      const MAX_HISTORY = 10;
      let channelHistory = [];
      const specBars = new Array(96).fill(0);
      let lastRdsSnapshot = { freq: null, station: "", title: "", artist: "" };

      function setStatus(msg) { statusEl.textContent = msg; }
      function setPillState(el, label, state) {
        el.textContent = label;
        el.classList.remove("active", "locked");
        if (state === "active") el.classList.add("active");
        if (state === "locked") el.classList.add("locked");
      }
      function setResumeStatus() {
        setStatus("Resume audio required");
      }
      function syncDial() {
        const freq = Number(freqEl.value);
        dialFreqEl.textContent = Number.isFinite(freq) && freq > 0 ? freq.toFixed(1) : "--.-";
      }
      function isEditingFrequency() {
        return document.activeElement === freqEl;
      }
      function isEditingGain() {
        return document.activeElement === rxGainEl;
      }
      function setToggleUi() {
        toggleBtn.disabled = retuning;
        prevStationBtn.disabled = retuning || channelHistory.length < 2;
        nextStationBtn.disabled = retuning || channelHistory.length < 2;
        if (running) {
          toggleBtn.innerHTML = '<span class="material-symbols-rounded">pause</span>';
          toggleBtn.setAttribute("aria-label", "Pause stream");
          toggleBtn.setAttribute("title", "Pause stream");
          toggleBtn.classList.add("stop");
        } else {
          toggleBtn.innerHTML = '<span class="material-symbols-rounded">play_arrow</span>';
          toggleBtn.setAttribute("aria-label", "Start listening");
          toggleBtn.setAttribute("title", "Start listening");
          toggleBtn.classList.remove("stop");
        }
      }
      function setRetuning(value) {
        retuning = value;
        deviceEl.disabled = value;
        freqEl.disabled = value;
        advancedModeEl.disabled = value;
        rxGainEl.disabled = value;
        stereoModeEl.disabled = value;
        toggleBtn.disabled = value;
        prevStationBtn.disabled = value || channelHistory.length < 2;
        nextStationBtn.disabled = value || channelHistory.length < 2;
        renderHistory();
      }

      function loadHistory() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          channelHistory = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(channelHistory)) channelHistory = [];
        } catch (_) {
          channelHistory = [];
        }
        renderHistory();
      }

      function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(channelHistory.slice(0, MAX_HISTORY)));
      }

      function addHistory(freq) {
        const val = Number(freq).toFixed(1);
        channelHistory = [val, ...channelHistory.filter((x) => x !== val)].slice(0, MAX_HISTORY);
        saveHistory();
        renderHistory();
      }

      function renderHistory() {
        historyListEl.innerHTML = "";
        for (const ch of channelHistory) {
          const li = document.createElement("li");
          li.textContent = `${ch} MHz`;
          const isActive = activeFreq !== null && Math.abs(Number(ch) - Number(activeFreq)) < 0.05;
          if (isActive) li.classList.add("active");
          if (retuning) li.classList.add("disabled");
          li.onclick = async () => {
            if (retuning) return;
            freqEl.value = ch;
            syncDial();
            await tuneNow();
          };
          historyListEl.appendChild(li);
        }
      }
      async function tuneHistoryOffset(offset) {
        if (retuning || channelHistory.length < 2) return;
        const current = activeFreq !== null ? Number(activeFreq).toFixed(1) : Number(freqEl.value || 0).toFixed(1);
        const currentIndex = Math.max(0, channelHistory.findIndex((ch) => ch === current));
        const nextIndex = (currentIndex + offset + channelHistory.length) % channelHistory.length;
        freqEl.value = channelHistory[nextIndex];
        syncDial();
        await tuneNow();
      }

      async function loadDevices() {
        const resp = await fetch("/api/devices");
        const devices = await resp.json();
        if (!resp.ok) {
          deviceEl.innerHTML = "";
          setStatus(devices.error || "Could not reach sdr-gateway.");
          return;
        }
        deviceEl.innerHTML = "";
        for (const d of devices) {
          const opt = document.createElement("option");
          opt.value = d.id;
          opt.textContent = `${d.id} (${d.driver || "unknown"})`;
          deviceEl.appendChild(opt);
        }
        if (!devices.length) setStatus("No SDR devices found via sdr-gateway.");
      }

      function ensureAudio() {
        if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 48000 });
        if (!gainNode) {
          gainNode = audioCtx.createGain();
          gainNode.gain.value = Number(volumeEl.value);
          gainNode.connect(audioCtx.destination);
        }
        if (audioCtx.state === "suspended") return audioCtx.resume();
        if (playCursor < audioCtx.currentTime + 0.25) playCursor = audioCtx.currentTime + 0.25;
        return Promise.resolve();
      }
      async function tryEnsureAudio(timeoutMs = 250) {
        try {
          await Promise.race([
            ensureAudio(),
            new Promise((_, reject) => setTimeout(() => reject(new Error("audio resume timeout")), timeoutMs)),
          ]);
          return !(audioCtx && audioCtx.state === "suspended");
        } catch (_) {
          return false;
        }
      }
      async function resumeAudioNow() {
        try {
          await ensureAudio();
          if (audioCtx && audioCtx.state === "suspended") {
            resumePending = true;
            setResumeStatus();
            return;
          }
          resumePending = false;
          if (running) audioLoop();
          setStatus(`Streaming FM at ${Number(freqEl.value).toFixed(1)} MHz`);
        } catch (_) {
          resumePending = true;
          setResumeStatus();
        }
      }
      function setVolumeUi() {
        const pct = Math.round(Number(volumeEl.value) * 100);
        volumeValueEl.textContent = `${pct}%`;
      }
      function loadSavedVolume() {
        const saved = Number(localStorage.getItem(VOLUME_KEY));
        if (Number.isFinite(saved)) {
          volumeEl.value = String(Math.max(0, Math.min(1.2, saved)));
        }
        setVolumeUi();
      }
      function saveVolume() {
        localStorage.setItem(VOLUME_KEY, String(Number(volumeEl.value)));
      }
      function gainToStages(totalGain) {
        const total = Math.max(0, Math.min(102, Number(totalGain)));
        if (total <= 32) {
          return { lna: Math.round(total / 8) * 8, vga: 0 };
        }
        if (total <= 72) {
          return { lna: 32, vga: Math.round((total - 32) / 2) * 2 };
        }
        if (total <= 80) {
          return { lna: Math.round((32 + total - 72) / 8) * 8, vga: 40 };
        }
        return { lna: 40, vga: Math.round((total - 40) / 2) * 2 };
      }
      function stagesToGain(lna, vga) {
        const lnaValue = Number(lna);
        const vgaValue = Number(vga);
        if (lnaValue <= 32) return Math.max(0, Math.min(72, lnaValue + vgaValue));
        return Math.max(72, Math.min(102, 72 + (lnaValue - 32) + Math.max(0, vgaValue - 40)));
      }
      function setGainUi() {
        rxGainValueEl.textContent = `${Number(rxGainEl.value)} dB`;
      }
      function syncGainFromStatus(s) {
        if (isEditingGain()) return;
        if (s.lna_gain_db !== undefined && s.vga_gain_db !== undefined) {
          rxGainEl.value = stagesToGain(s.lna_gain_db, s.vga_gain_db);
        }
        setGainUi();
      }
      function stereoLabel(s = null) {
        const enabled = s ? !!s.stereo_enabled : stereoModeEl.checked;
        return enabled ? "Stereo" : "Mono";
      }
      function setStereoUi(s = null) {
        if (s && !retuning) stereoModeEl.checked = !!s.stereo_enabled;
        setPillState(statusStereoEl, stereoLabel(s), "active");
      }
      function rdsLabel(s) {
        if (!s || !s.rds_available || !s.rds_enabled) return "RDS Off";
        if (Number(s.rds_json_lines || 0) > 0) return "RDS Locked";
        return "RDS Scan";
      }
      function fmState(s) {
        if (!s || !s.running) return "inactive";
        if (s.worker_error) return "active";
        const rms = Number(s.last_audio_rms || 0);
        return rms >= 0.02 ? "locked" : "active";
      }
      function rdsState(s) {
        if (!s || !s.rds_available || !s.rds_enabled) return "inactive";
        return Number(s.rds_json_lines || 0) > 0 ? "locked" : "active";
      }
      function updateSignalPills(s) {
        setPillState(statusFmEl, "FM", fmState(s));
        setPillState(statusRdsEl, "RDS", rdsState(s));
        setStereoUi(s);
      }
      function loadStereoMode() {
        stereoModeEl.checked = localStorage.getItem(STEREO_KEY) === "1";
        setStereoUi();
      }
      function saveStereoMode() {
        localStorage.setItem(STEREO_KEY, stereoModeEl.checked ? "1" : "0");
      }
      function setAdvancedUi() {
        advancedPanelEl.classList.toggle("visible", advancedModeEl.checked);
      }
      function loadAdvancedMode() {
        advancedModeEl.checked = localStorage.getItem(ADVANCED_KEY) === "1";
        setAdvancedUi();
      }
      function saveAdvancedMode() {
        localStorage.setItem(ADVANCED_KEY, advancedModeEl.checked ? "1" : "0");
      }
      function resetRdsSnapshot(freq = null) {
        lastRdsSnapshot = { freq, station: "", title: "", artist: "" };
      }
      async function applyGainIfRunning() {
        setGainUi();
        if (!running) return;
        const stages = gainToStages(rxGainEl.value);
        setStatus(`Applying gain: LNA ${stages.lna} dB | VGA ${stages.vga} dB`);
        await tuneNow();
      }
      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[ch]);
      }
      function normalizeRadioText(text, station, freqMhz) {
        let clean = String(text || "").replace(/\s+/g, " ").trim();
        const stationClean = String(station || "").trim();
        const freq = Number(freqMhz);
        const escapedStation = stationClean ? stationClean.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") : "";
        if (Number.isFinite(freq)) {
          const freqPattern = freq.toFixed(1).replace(".", "\\.");
          if (escapedStation) {
            clean = clean.replace(new RegExp(`^${escapedStation}\\b\\s+${freqPattern}\\s*(?:mhz)?\\b\\s*`, "i"), "").trim();
          }
          clean = clean.replace(new RegExp(`^${freqPattern}\\s*(?:mhz)?\\b\\s*`, "i"), "").trim();
        }
        if (escapedStation) {
          clean = clean.replace(new RegExp(`^${escapedStation}\\b\\s*[:|]\\s*`, "i"), "").trim();
        }
        return clean;
      }
      function parseRadioText(text, station = "", freqMhz = null) {
        const clean = normalizeRadioText(text, station, freqMhz);
        if (!clean) return { title: "Waiting for RDS text", artist: "", raw: "" };
        const split = clean.split(/\s+-\s+|\s+\u2013\s+|\s+\/\s+/);
        if (split.length >= 2) {
          return { artist: split[0].trim(), title: split.slice(1).join(" - ").trim(), raw: clean };
        }
        const words = clean.split(/\s+/).filter(Boolean);
        if (words.length >= 3) {
          return { artist: words.slice(0, 2).join(" "), title: words.slice(2).join(" "), raw: clean };
        }
        return { title: clean, artist: "", raw: clean };
      }
      function renderRds(s) {
        const freq = Number(s.freq_mhz);
        if (Number.isFinite(freq) && lastRdsSnapshot.freq !== null && Math.abs(freq - Number(lastRdsSnapshot.freq)) > 0.05) {
          resetRdsSnapshot(freq);
        }
        const station = (s.rds_ps || "").trim();
        const text = parseRadioText(s.rds_rt || "", station, freq);
        const rdsDb = Number(s.rds_subcarrier_db);
        const hasJson = Number(s.rds_json_lines || 0) > 0;
        const hasSignal = Number.isFinite(rdsDb) && rdsDb > 6;
        if (Number.isFinite(freq)) lastRdsSnapshot.freq = freq;
        if (station) lastRdsSnapshot.station = station;
        if (text.title && text.title !== "Waiting for RDS text") lastRdsSnapshot.title = text.title;
        if (text.artist) lastRdsSnapshot.artist = text.artist;
        const stationLabel = station || lastRdsSnapshot.station || "No station name";
        const titleLabel = (text.title && text.title !== "Waiting for RDS text" ? text.title : "") || lastRdsSnapshot.title || "Waiting for RDS text";
        const artistLabel = text.artist || lastRdsSnapshot.artist || "";
        rdsCardEl.classList.toggle("locked", hasJson);
        rdsCardEl.classList.toggle("locking", !hasJson && hasSignal);
        updateSignalPills(s);
        rdsEl.innerHTML = `
          <div class="rds-station">${escapeHtml(stationLabel)}</div>
          <div class="rds-main">${escapeHtml(titleLabel)}</div>
          <div class="rds-sub">${escapeHtml(artistLabel)}</div>
        `;
      }
      async function fetchJsonWithTimeout(url, opts = {}, timeoutMs = 1800) {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
          const resp = await fetch(url, { ...opts, signal: ctrl.signal, cache: "no-store" });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          return await resp.json();
        } finally {
          clearTimeout(t);
        }
      }
      function drawMiniSpec() {
        const w = specCanvas.width;
        const h = specCanvas.height;
        specCtx.fillStyle = "#0b1220";
        specCtx.fillRect(0, 0, w, h);
        const bw = w / specBars.length;
        for (let i = 0; i < specBars.length; i++) {
          const v = Math.max(0, Math.min(1, specBars[i]));
          const bh = Math.max(2, v * (h - 6));
          const x = i * bw;
          const y = h - bh - 3;
          const hue = 0 + (235 * i) / Math.max(1, specBars.length - 1);
          const lightness = 42 + v * 20;
          specCtx.fillStyle = `hsla(${hue}, 92%, ${lightness}%, 0.95)`;
          specCtx.fillRect(x + 1, y, Math.max(1, bw - 2), bh);
          specBars[i] *= 0.82;
        }
        requestAnimationFrame(drawMiniSpec);
      }

      function schedulePcm16(arrayBuffer) {
        const pcm = new Int16Array(arrayBuffer);
        const frames = Math.floor(pcm.length / 2);
        if (!frames) return;
        const left = new Float32Array(frames);
        const right = new Float32Array(frames);
        const f32 = new Float32Array(frames);
        for (let i = 0; i < frames; i++) {
          const l = pcm[i * 2] / 32768.0;
          const r = pcm[i * 2 + 1] / 32768.0;
          left[i] = l;
          right[i] = r;
          f32[i] = (l + r) * 0.5;
        }

        if (f32.length) {
          const n = 192;
          if (f32.length >= n) {
          const bins = specBars.length;
          for (let b = 0; b < bins; b++) {
            const k = b + 1;
            let re = 0;
            let im = 0;
            for (let t = 0; t < n; t++) {
              const ang = (2 * Math.PI * k * t) / n;
              re += f32[t] * Math.cos(ang);
              im -= f32[t] * Math.sin(ang);
            }
            const mag = Math.sqrt(re * re + im * im) / n;
            specBars[b] = Math.max(specBars[b], Math.min(1, mag * 11));
          }
        }
        }

        const buf = audioCtx.createBuffer(2, frames, 48000);
        buf.copyToChannel(left, 0, 0);
        buf.copyToChannel(right, 1, 0);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(gainNode);

        const startAt = Math.max(playCursor, audioCtx.currentTime + 0.02);
        src.start(startAt);
        playCursor = startAt + buf.duration;
      }

      async function audioLoop() {
        if (audioLoopActive) return;
        audioLoopActive = true;
        while (running) {
          try {
            if (!audioCtx || !gainNode) {
              if (!(await tryEnsureAudio())) {
                resumePending = true;
                setResumeStatus();
                await new Promise((r) => setTimeout(r, 120));
                continue;
              }
            }
            const resp = await fetch("/api/audio/batch?count=6&timeout=0.4", { cache: "no-store" });
            if (resp.status === 204) {
              await new Promise((r) => setTimeout(r, 120));
              continue;
            }
            if (!resp.ok) throw new Error(`audio fetch failed (${resp.status})`);
            schedulePcm16(await resp.arrayBuffer());
            bufferedStarts += 1;

            // If we drift too far ahead, drop buffered latency and re-lock near real-time.
            const lead = playCursor - audioCtx.currentTime;
            if (lead > 1.0) {
              playCursor = audioCtx.currentTime + 0.3;
            }
          } catch (err) {
            setStatus(`Audio loop error: ${err.message}`);
            await new Promise((r) => setTimeout(r, 80));
          }
        }
        audioLoopActive = false;
      }

      async function statusLoop() {
        while (true) {
          try {
            const s = await fetchJsonWithTimeout("/api/radio/status", {}, 1500);
            running = !!s.running;
            setToggleUi();
            if (running) {
              localStorage.setItem(RESUME_KEY, "1");
              syncGainFromStatus(s);
              if (!isEditingFrequency()) {
                freqEl.value = Number(s.freq_mhz || freqEl.value).toFixed(1);
                syncDial();
              }
              activeFreq = Number(s.freq_mhz);
              renderHistory();
              resumePending = !(await tryEnsureAudio());
              audioLoop();
            } else {
              resumePending = false;
              localStorage.removeItem(RESUME_KEY);
            }
            updateSignalPills(s);
            if (s.running) {
              if (resumePending) {
                setResumeStatus();
              } else if (s.worker_error) {
                setStatus(`${s.worker_error}...`);
              } else {
                setStatus(`Streaming FM at ${Number(s.freq_mhz).toFixed(1)} MHz | ${stereoLabel(s)} | LNA ${s.lna_gain_db} dB | VGA ${s.vga_gain_db} dB`);
              }
            } else {
              setStatus("Stopped.");
            }
            renderRds(s);
          } catch (_) {}
          await new Promise((r) => setTimeout(r, 500));
        }
      }

      async function syncStatusOnce() {
        try {
          await fetchJsonWithTimeout(
            "/api/radio/attach-existing",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ stereo_enabled: stereoModeEl.checked }),
            },
            1800
          ).catch(() => ({}));
          const s = await fetchJsonWithTimeout("/api/radio/status", {}, 1500);
          running = !!s.running;
          setToggleUi();
          if (running) {
            localStorage.setItem(RESUME_KEY, "1");
            syncGainFromStatus(s);
            freqEl.value = Number(s.freq_mhz || freqEl.value).toFixed(1);
            syncDial();
            activeFreq = Number(s.freq_mhz);
            renderHistory();
            if (s.device_id) {
              deviceEl.value = s.device_id;
            }
            setToggleUi();
            resumePending = !(await tryEnsureAudio());
            audioLoop();
            if (resumePending) {
              setResumeStatus();
            } else {
              setStatus(`Streaming FM at ${Number(s.freq_mhz).toFixed(1)} MHz | ${stereoLabel(s)} | LNA ${s.lna_gain_db} dB | VGA ${s.vga_gain_db} dB`);
            }
          } else {
            localStorage.removeItem(RESUME_KEY);
            updateSignalPills(s);
            setStatus("Idle.");
          }
        } catch (_) {
          setStatus("Idle. Press Start Listening.");
          running = false;
          updateSignalPills({ running: false, stereo_enabled: stereoModeEl.checked, rds_available: false, rds_enabled: false, rds_json_lines: 0 });
          setToggleUi();
        }
      }

      async function tuneNow() {
        if (retuning) return;
        try {
          syncDial();
          const freq = Number(freqEl.value);
          if (!Number.isFinite(freq) || freq < 87.5 || freq > 108) {
            setStatus("Enter an FM frequency between 87.5 and 108 MHz.");
            return;
          }
          const stages = gainToStages(rxGainEl.value);
          const payload = {
            device_id: deviceEl.value,
            freq_mhz: freq,
            sample_rate_sps: 2000000,
            lna_gain_db: stages.lna,
            vga_gain_db: stages.vga,
            stereo_enabled: stereoModeEl.checked,
          };
          if (activeFreq === null || Math.abs(Number(activeFreq) - payload.freq_mhz) > 0.05) {
            resetRdsSnapshot(payload.freq_mhz);
          }
          setRetuning(true);
          setStatus(`Retuning to ${payload.freq_mhz.toFixed(1)} MHz...`);
          const resp = await fetch("/api/radio/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || data.error || "start failed");
          running = true;
          localStorage.setItem(RESUME_KEY, "1");
          resumePending = !(await tryEnsureAudio());
          audioLoop();
          bufferedStarts = 0;
          addHistory(payload.freq_mhz);
          activeFreq = payload.freq_mhz;
          if (data.lna_gain_db !== undefined && data.vga_gain_db !== undefined) {
            rxGainEl.value = stagesToGain(data.lna_gain_db, data.vga_gain_db);
          }
          setGainUi();
          updateSignalPills({ running: true, stereo_enabled: stereoModeEl.checked, rds_available: false, rds_enabled: false, rds_json_lines: 0, worker_error: "", last_audio_rms: 0 });
          if (resumePending) {
            setResumeStatus();
          } else {
            setStatus(`Streaming FM at ${payload.freq_mhz.toFixed(1)} MHz`);
          }
          setToggleUi();
        } catch (err) {
          setStatus(`Start failed: ${err.message}`);
        } finally {
          setRetuning(false);
        }
      }

      async function stopNow() {
        running = false;
        localStorage.removeItem(RESUME_KEY);
        await fetch("/api/radio/stop", { method: "POST" });
        updateSignalPills({ running: false, stereo_enabled: stereoModeEl.checked, rds_available: false, rds_enabled: false, rds_json_lines: 0 });
        setStatus("Stopped.");
        setToggleUi();
      }

      toggleBtn.onclick = async () => {
        if (running) await stopNow();
        else await tuneNow();
      };
      prevStationBtn.onclick = () => tuneHistoryOffset(1);
      nextStationBtn.onclick = () => tuneHistoryOffset(-1);

      window.addEventListener("pointerdown", async () => {
        if (!resumePending || !running) return;
        await resumeAudioNow();
      }, { passive: true });

      window.addEventListener("beforeunload", () => {
        if (running) localStorage.setItem(RESUME_KEY, "1");
      });

      window.addEventListener("pageshow", () => {
        if (localStorage.getItem(RESUME_KEY) === "1") {
          tryEnsureAudio();
          syncStatusOnce();
        }
      });

      freqEl.addEventListener("keydown", async (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          await tuneNow();
        }
      });

      freqEl.addEventListener("input", syncDial);
      volumeEl.addEventListener("input", () => {
        setVolumeUi();
        saveVolume();
        if (gainNode) gainNode.gain.value = Number(volumeEl.value);
      });
      rxGainEl.addEventListener("input", setGainUi);
      rxGainEl.addEventListener("change", applyGainIfRunning);
      advancedModeEl.addEventListener("change", () => {
        saveAdvancedMode();
        setAdvancedUi();
      });
      stereoModeEl.addEventListener("change", async () => {
        saveStereoMode();
        setStereoUi();
        if (running) await tuneNow();
      });
      syncDial();
      loadSavedVolume();
      loadAdvancedMode();
      loadStereoMode();
      setGainUi();
      drawMiniSpec();
      async function initPage() {
        loadHistory();
        setToggleUi();
        setStatus("Loading devices...");
        try {
          await loadDevices();
        } catch (_) {
          setStatus("Could not load SDR devices.");
        }
        setStatus("Checking existing stream...");
        await syncStatusOnce();
        statusLoop();
      }

      initPage();
    </script>
  </body>
</html>
