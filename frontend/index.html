<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDR FM Radio</title>
    <style>
      :root {
        --bg1: #f4f6fb;
        --bg2: #dbe4f1;
        --glass: rgba(255, 255, 255, 0.58);
        --glass-strong: rgba(255, 255, 255, 0.76);
        --text: #111827;
        --muted: #6b7280;
        --accent: #0a84ff;
        --danger: #ff453a;
        --ring: rgba(10, 132, 255, 0.25);
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 14%, rgba(10, 132, 255, 0.16), transparent 35%),
          radial-gradient(circle at 88% 18%, rgba(255, 255, 255, 0.6), transparent 40%),
          linear-gradient(155deg, var(--bg1), var(--bg2));
        display: grid;
        place-items: center;
      }
      .card {
        width: min(860px, 95vw);
        background: var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 28px;
        padding: 24px;
        backdrop-filter: blur(20px) saturate(150%);
        box-shadow: 0 26px 60px rgba(31, 41, 55, 0.16);
      }
      .top {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 18px;
        align-items: stretch;
      }
      .now {
        border-radius: 22px;
        padding: 22px;
        background: var(--glass-strong);
        border: 1px solid rgba(255, 255, 255, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      h1 { margin: 0; font-size: 1.3rem; letter-spacing: 0.01em; font-weight: 600; }
      .sub { color: var(--muted); margin: 6px 0 12px; font-size: 0.92rem; }
      .dial {
        margin-top: 8px;
        font-size: clamp(2.1rem, 4vw, 3rem);
        letter-spacing: 0.02em;
        font-weight: 700;
      }
      .controls {
        border-radius: 22px;
        padding: 18px;
        background: var(--glass-strong);
        border: 1px solid rgba(255, 255, 255, 0.85);
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      label { display: block; font-size: 0.78rem; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
      input, select, button {
        width: 100%; border: 1px solid rgba(209, 213, 219, 0.8); border-radius: 12px; padding: 11px 12px; font-size: 1rem;
        box-sizing: border-box;
      }
      input, select { background: rgba(255,255,255,0.85); color: var(--text); }
      input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--ring);
      }
      button { cursor: pointer; font-weight: 600; }
      #toggleBtn { background: var(--accent); color: white; border-color: transparent; }
      #toggleBtn.stop { background: var(--danger); }
      .status { margin-top: 16px; font-size: 0.92rem; color: #0a84ff; font-weight: 500; }
      .status button {
        width: auto;
        margin-left: 8px;
        padding: 5px 9px;
        border-radius: 8px;
        border: 0;
        background: var(--accent);
        color: white;
        font-size: 0.82rem;
      }
      .metrics {
        margin-top: 14px;
        padding: 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.8);
        border: 1px solid rgba(229, 231, 235, 0.9);
        color: #334155;
      }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .audio-tools {
        margin-top: 12px;
        padding: 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.8);
        border: 1px solid rgba(229, 231, 235, 0.9);
      }
      .vol-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
      }
      .vol-row label,
      .gain-row label {
        margin: 0;
        font-size: 0.78rem;
      }
      .gain-grid {
        margin-top: 12px;
        display: grid;
        gap: 6px;
      }
      .gain-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 8px;
      }
      #volumeValue,
      .gain-value {
        font-size: 0.86rem;
        color: var(--muted);
        min-width: 40px;
        text-align: right;
      }
      #miniSpec {
        margin-top: 10px;
        width: 100%;
        height: 72px;
        border-radius: 10px;
        display: block;
        background: #0b1220;
        border: 1px solid rgba(209, 213, 219, 0.45);
      }
      .chart-mode {
        margin-top: 10px;
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        padding: 3px;
        border-radius: 10px;
        background: rgba(17, 24, 39, 0.08);
        border: 1px solid rgba(209, 213, 219, 0.75);
      }
      .chart-mode button {
        border: 0;
        border-radius: 8px;
        padding: 7px 12px;
        background: transparent;
        color: var(--muted);
        font-size: 0.88rem;
      }
      .chart-mode button.active {
        background: rgba(255,255,255,0.9);
        color: var(--text);
        box-shadow: 0 1px 5px rgba(31, 41, 55, 0.12);
      }
      .history {
        padding: 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.8);
        border: 1px solid rgba(229, 231, 235, 0.9);
      }
      .history h3 {
        margin: 0 0 8px;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
      }
      #historyList {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 6px;
      }
      #historyList li {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(209, 213, 219, 0.85);
        font-size: 0.95rem;
        cursor: pointer;
        user-select: none;
        background: rgba(255,255,255,0.75);
      }
      #historyList li:hover {
        border-color: var(--accent);
      }
      .bottom-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .rds-card {
        padding: 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.8);
        border: 1px solid rgba(229, 231, 235, 0.9);
      }
      .rds-card h3 {
        margin: 0 0 8px;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
      }
      #rds {
        margin: 0;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(209, 213, 219, 0.85);
        background: rgba(255,255,255,0.75);
        font-size: 0.92rem;
      }
      .rds-main {
        font-weight: 650;
        color: var(--text);
      }
      .rds-sub {
        margin-top: 4px;
        color: var(--muted);
      }
      .rds-meta {
        margin-top: 6px;
        font-size: 0.82rem;
        color: var(--muted);
      }
      .rds-debug {
        margin-top: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.76rem;
        color: var(--muted);
        overflow-wrap: anywhere;
      }
      @media (max-width: 860px) {
        .top { grid-template-columns: 1fr; }
        .bottom-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 700px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="top">
        <div class="now">
          <h1>Now Playing</h1>
          <div class="sub">Live FM stream via SDR gateway</div>
          <div class="dial"><span id="dialFreq">92.1</span> MHz</div>
        </div>
        <div class="controls">
          <div class="row">
            <div>
              <label for="device">SDR Device</label>
              <select id="device"></select>
            </div>
            <div>
              <label for="freq">Frequency (MHz)</label>
              <input id="freq" type="number" min="76" max="108" step="0.1" value="92.1" />
            </div>
          </div>
          <div class="row" style="margin-top: 10px;">
            <button id="toggleBtn">Start Listening</button>
          </div>
          <div class="gain-grid">
            <div class="gain-row">
              <label for="rxGain">Gain</label>
              <input id="rxGain" type="range" min="0" max="102" step="2" value="72" />
              <span class="gain-value" id="rxGainValue">72 dB</span>
            </div>
            <div class="gain-value" id="rxGainDetail">LNA 32 dB | VGA 40 dB</div>
          </div>
        </div>
      </div>
      <div class="status" id="status">Idle.</div>
      <div class="audio-tools">
        <div class="vol-row">
          <label for="volume">Volume</label>
          <input id="volume" type="range" min="0" max="1.2" step="0.01" value="0.85" />
          <span id="volumeValue">85%</span>
        </div>
        <div class="chart-mode">
          <button id="spectrumModeBtn" class="active" type="button">Spectrum</button>
          <button id="waveModeBtn" type="button">Waveform</button>
        </div>
        <canvas id="miniSpec" width="800" height="72"></canvas>
      </div>
      <div class="bottom-grid">
        <div class="rds-card">
          <h3>RDS</h3>
          <div id="rds">RDS: waiting...</div>
        </div>
        <div class="history">
          <h3>Recent Channels (Double-click to tune)</h3>
          <ul id="historyList"></ul>
        </div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const rdsEl = document.getElementById("rds");
      const deviceEl = document.getElementById("device");
      const freqEl = document.getElementById("freq");
      const dialFreqEl = document.getElementById("dialFreq");
      const toggleBtn = document.getElementById("toggleBtn");
      const historyListEl = document.getElementById("historyList");
      const volumeEl = document.getElementById("volume");
      const volumeValueEl = document.getElementById("volumeValue");
      const rxGainEl = document.getElementById("rxGain");
      const rxGainValueEl = document.getElementById("rxGainValue");
      const rxGainDetailEl = document.getElementById("rxGainDetail");
      const spectrumModeBtn = document.getElementById("spectrumModeBtn");
      const waveModeBtn = document.getElementById("waveModeBtn");
      const specCanvas = document.getElementById("miniSpec");
      const specCtx = specCanvas.getContext("2d");

      let running = false;
      let audioCtx = null;
      let gainNode = null;
      let playCursor = 0;
      let bufferedStarts = 0;
      let audioLoopActive = false;
      let resumePending = false;
      const HISTORY_KEY = "fm_channel_history_v1";
      const RESUME_KEY = "fm_was_playing_v1";
      const VOLUME_KEY = "fm_volume_v1";
      const MAX_HISTORY = 10;
      let channelHistory = [];
      let chartMode = "spectrum";
      const specBars = new Array(96).fill(0);
      const waveBars = new Array(96).fill(0);
      const levelTrail = new Array(96).fill(0);
      let waveLevel = 0.08;

      function setStatus(msg) { statusEl.textContent = msg; }
      function setResumeStatus() {
        statusEl.innerHTML = `Stream is live. <button id="resumeAudioBtn" type="button">Resume Audio</button>`;
        const btn = document.getElementById("resumeAudioBtn");
        if (btn) btn.onclick = resumeAudioNow;
      }
      function syncDial() {
        const freq = Number(freqEl.value);
        dialFreqEl.textContent = Number.isFinite(freq) && freq > 0 ? freq.toFixed(1) : "--.-";
      }
      function isEditingFrequency() {
        return document.activeElement === freqEl;
      }
      function isEditingGain() {
        return document.activeElement === rxGainEl;
      }
      function setToggleUi() {
        if (running) {
          toggleBtn.textContent = "Stop";
          toggleBtn.classList.add("stop");
        } else {
          toggleBtn.textContent = "Start Listening";
          toggleBtn.classList.remove("stop");
        }
      }

      function loadHistory() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          channelHistory = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(channelHistory)) channelHistory = [];
        } catch (_) {
          channelHistory = [];
        }
        renderHistory();
      }

      function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(channelHistory.slice(0, MAX_HISTORY)));
      }

      function addHistory(freq) {
        const val = Number(freq).toFixed(1);
        channelHistory = [val, ...channelHistory.filter((x) => x !== val)].slice(0, MAX_HISTORY);
        saveHistory();
        renderHistory();
      }

      function renderHistory() {
        historyListEl.innerHTML = "";
        for (const ch of channelHistory) {
          const li = document.createElement("li");
          li.textContent = `${ch} MHz`;
          li.ondblclick = async () => {
            freqEl.value = ch;
            syncDial();
            await tuneNow();
          };
          historyListEl.appendChild(li);
        }
      }

      async function loadDevices() {
        const resp = await fetch("/api/devices");
        const devices = await resp.json();
        if (!resp.ok) {
          deviceEl.innerHTML = "";
          setStatus(devices.error || "Could not reach sdr-gateway.");
          return;
        }
        deviceEl.innerHTML = "";
        for (const d of devices) {
          const opt = document.createElement("option");
          opt.value = d.id;
          opt.textContent = `${d.id} (${d.driver || "unknown"})`;
          deviceEl.appendChild(opt);
        }
        if (!devices.length) setStatus("No SDR devices found via sdr-gateway.");
      }

      function ensureAudio() {
        if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 48000 });
        if (!gainNode) {
          gainNode = audioCtx.createGain();
          gainNode.gain.value = Number(volumeEl.value);
          gainNode.connect(audioCtx.destination);
        }
        if (audioCtx.state === "suspended") return audioCtx.resume();
        if (playCursor < audioCtx.currentTime + 0.25) playCursor = audioCtx.currentTime + 0.25;
        return Promise.resolve();
      }
      async function tryEnsureAudio(timeoutMs = 250) {
        try {
          await Promise.race([
            ensureAudio(),
            new Promise((_, reject) => setTimeout(() => reject(new Error("audio resume timeout")), timeoutMs)),
          ]);
          return !(audioCtx && audioCtx.state === "suspended");
        } catch (_) {
          return false;
        }
      }
      async function resumeAudioNow() {
        try {
          await ensureAudio();
          if (audioCtx && audioCtx.state === "suspended") {
            resumePending = true;
            setResumeStatus();
            return;
          }
          resumePending = false;
          if (running) audioLoop();
          setStatus(`Streaming FM at ${Number(freqEl.value).toFixed(1)} MHz`);
        } catch (_) {
          resumePending = true;
          setResumeStatus();
        }
      }
      function setVolumeUi() {
        const pct = Math.round(Number(volumeEl.value) * 100);
        volumeValueEl.textContent = `${pct}%`;
      }
      function loadSavedVolume() {
        const saved = Number(localStorage.getItem(VOLUME_KEY));
        if (Number.isFinite(saved)) {
          volumeEl.value = String(Math.max(0, Math.min(1.2, saved)));
        }
        setVolumeUi();
      }
      function saveVolume() {
        localStorage.setItem(VOLUME_KEY, String(Number(volumeEl.value)));
      }
      function gainToStages(totalGain) {
        const total = Math.max(0, Math.min(102, Number(totalGain)));
        if (total <= 32) {
          return { lna: Math.round(total / 8) * 8, vga: 0 };
        }
        if (total <= 72) {
          return { lna: 32, vga: Math.round((total - 32) / 2) * 2 };
        }
        if (total <= 80) {
          return { lna: Math.round((32 + total - 72) / 8) * 8, vga: 40 };
        }
        return { lna: 40, vga: Math.round((total - 40) / 2) * 2 };
      }
      function stagesToGain(lna, vga) {
        const lnaValue = Number(lna);
        const vgaValue = Number(vga);
        if (lnaValue <= 32) return Math.max(0, Math.min(72, lnaValue + vgaValue));
        return Math.max(72, Math.min(102, 72 + (lnaValue - 32) + Math.max(0, vgaValue - 40)));
      }
      function setGainUi() {
        const stages = gainToStages(rxGainEl.value);
        rxGainValueEl.textContent = `${Number(rxGainEl.value)} dB`;
        rxGainDetailEl.textContent = `LNA ${stages.lna} dB | VGA ${stages.vga} dB`;
      }
      function syncGainFromStatus(s) {
        if (isEditingGain()) return;
        if (s.lna_gain_db !== undefined && s.vga_gain_db !== undefined) {
          rxGainEl.value = stagesToGain(s.lna_gain_db, s.vga_gain_db);
        }
        setGainUi();
      }
      async function applyGainIfRunning() {
        setGainUi();
        if (!running) return;
        const stages = gainToStages(rxGainEl.value);
        setStatus(`Applying gain: LNA ${stages.lna} dB | VGA ${stages.vga} dB`);
        await tuneNow();
      }
      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[ch]);
      }
      function parseRadioText(text) {
        const clean = String(text || "").trim();
        if (!clean) return { title: "Waiting for RDS text", artist: "", raw: "" };
        const split = clean.split(/\s+-\s+|\s+\u2013\s+|\s+\/\s+/);
        if (split.length >= 2) {
          return { artist: split[0].trim(), title: split.slice(1).join(" - ").trim(), raw: clean };
        }
        return { title: clean, artist: "", raw: clean };
      }
      function renderRds(s) {
        const station = (s.rds_ps || "").trim();
        const text = parseRadioText(s.rds_rt || "");
        const status = s.rds_available ? (s.rds_enabled ? "RDS on" : "RDS idle") : "RDS unavailable";
        const feedKb = Math.round(Number(s.rds_feed_bytes || 0) / 1024);
        const lines = Number(s.rds_lines || 0);
        const jsonLines = Number(s.rds_json_lines || 0);
        const err = s.rds_error ? ` | ${s.rds_error}` : "";
        rdsEl.innerHTML = `
          <div class="rds-main">${escapeHtml(text.title)}</div>
          ${text.artist ? `<div class="rds-sub">${escapeHtml(text.artist)}</div>` : ""}
          <div class="rds-meta">${escapeHtml(station || "No station name")} | ${escapeHtml(status)}</div>
          <div class="rds-debug">feed ${feedKb} KB | lines ${lines} | json ${jsonLines}${escapeHtml(err)}</div>
        `;
      }
      async function fetchJsonWithTimeout(url, opts = {}, timeoutMs = 1800) {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
          const resp = await fetch(url, { ...opts, signal: ctrl.signal, cache: "no-store" });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          return await resp.json();
        } finally {
          clearTimeout(t);
        }
      }
      function drawMiniSpec() {
        const w = specCanvas.width;
        const h = specCanvas.height;
        specCtx.fillStyle = "#0b1220";
        specCtx.fillRect(0, 0, w, h);
        if (chartMode === "waveform") {
          const center = h / 2;
          const bw = w / waveBars.length;
          specCtx.fillStyle = "rgba(255, 69, 58, 0.12)";
          specCtx.fillRect(0, 0, w, h);
          for (let i = 0; i < waveBars.length; i++) {
            const v = Math.max(0.02, Math.min(1, waveBars[i]));
            const bh = v * (h * 0.42);
            const x = i * bw + bw * 0.32;
            const barW = Math.max(1, bw * (0.18 + v * 0.28));
            const alpha = 0.25 + v * 0.62;
            specCtx.fillStyle = i > waveBars.length - 4 ? "rgba(255, 69, 58, 0.95)" : `rgba(255, 69, 58, ${alpha})`;
            specCtx.fillRect(x, center - bh, barW, bh * 2);
            waveBars[i] *= 0.86;
          }
          specCtx.strokeStyle = "rgba(255, 184, 179, 0.76)";
          specCtx.lineWidth = 1.5;
          specCtx.beginPath();
          for (let i = 0; i < levelTrail.length; i++) {
            const x = (i / (levelTrail.length - 1)) * w;
            const y = h - 6 - Math.min(1, levelTrail[i]) * (h * 0.24);
            if (i === 0) specCtx.moveTo(x, y);
            else specCtx.lineTo(x, y);
            levelTrail[i] *= 0.94;
          }
          specCtx.stroke();
          const playX = w * 0.74;
          specCtx.strokeStyle = "rgba(255, 69, 58, 0.95)";
          specCtx.lineWidth = 1;
          specCtx.beginPath();
          specCtx.moveTo(playX, 8);
          specCtx.lineTo(playX, h - 8);
          specCtx.stroke();
          specCtx.fillStyle = "rgba(255, 69, 58, 0.95)";
          specCtx.beginPath();
          specCtx.arc(playX, 8, 2, 0, Math.PI * 2);
          specCtx.arc(playX, h - 8, 2, 0, Math.PI * 2);
          specCtx.fill();
          requestAnimationFrame(drawMiniSpec);
          return;
        }
        const bw = w / specBars.length;
        for (let i = 0; i < specBars.length; i++) {
          const v = Math.max(0, Math.min(1, specBars[i]));
          const bh = Math.max(2, v * (h - 6));
          const x = i * bw;
          const y = h - bh - 3;
          const hue = 0 + (235 * i) / Math.max(1, specBars.length - 1);
          const lightness = 42 + v * 20;
          specCtx.fillStyle = `hsla(${hue}, 92%, ${lightness}%, 0.95)`;
          specCtx.fillRect(x + 1, y, Math.max(1, bw - 2), bh);
          specBars[i] *= 0.82;
        }
        requestAnimationFrame(drawMiniSpec);
      }

      function schedulePcm16(arrayBuffer) {
        const pcm = new Int16Array(arrayBuffer);
        if (!pcm.length) return;
        const f32 = new Float32Array(pcm.length);
        for (let i = 0; i < pcm.length; i++) f32[i] = pcm[i] / 32768.0;

        if (f32.length) {
          const windowSize = Math.min(f32.length, 2400);
          const start = f32.length - windowSize;
          const step = Math.max(1, Math.floor(windowSize / waveBars.length));
          let totalRms = 0;
          for (let i = 0; i < waveBars.length; i++) {
            let sum = 0;
            let count = 0;
            const from = start + i * step;
            const to = Math.min(f32.length, from + step);
            for (let j = from; j < to; j++) {
              sum += f32[j] * f32[j];
              count += 1;
            }
            const rms = Math.sqrt(sum / Math.max(1, count));
            totalRms += rms;
            waveLevel = Math.max(waveLevel * 0.985, rms);
            const normalized = rms / Math.max(0.025, waveLevel * 1.7);
            const compressed = Math.pow(Math.min(1, normalized), 0.72);
            waveBars[i] = waveBars[i] * 0.22 + compressed * 0.78;
          }
          levelTrail.shift();
          levelTrail.push(Math.pow(Math.min(1, (totalRms / waveBars.length) / Math.max(0.025, waveLevel)), 0.65));
        }

        // Update mini spectrograph from a simple DFT over a short audio window.
        const n = 192;
        if (f32.length >= n) {
          const bins = specBars.length;
          for (let b = 0; b < bins; b++) {
            const k = b + 1;
            let re = 0;
            let im = 0;
            for (let t = 0; t < n; t++) {
              const ang = (2 * Math.PI * k * t) / n;
              re += f32[t] * Math.cos(ang);
              im -= f32[t] * Math.sin(ang);
            }
            const mag = Math.sqrt(re * re + im * im) / n;
            specBars[b] = Math.max(specBars[b], Math.min(1, mag * 11));
          }
        }

        const buf = audioCtx.createBuffer(1, f32.length, 48000);
        buf.copyToChannel(f32, 0, 0);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(gainNode);

        const startAt = Math.max(playCursor, audioCtx.currentTime + 0.02);
        src.start(startAt);
        playCursor = startAt + buf.duration;
      }

      async function audioLoop() {
        if (audioLoopActive) return;
        audioLoopActive = true;
        while (running) {
          try {
            if (!audioCtx || !gainNode) {
              if (!(await tryEnsureAudio())) {
                resumePending = true;
                setResumeStatus();
                await new Promise((r) => setTimeout(r, 120));
                continue;
              }
            }
            const resp = await fetch("/api/audio/batch?count=6&timeout=0.4", { cache: "no-store" });
            if (resp.status === 204) {
              await new Promise((r) => setTimeout(r, 120));
              continue;
            }
            if (!resp.ok) throw new Error(`audio fetch failed (${resp.status})`);
            schedulePcm16(await resp.arrayBuffer());
            bufferedStarts += 1;

            // If we drift too far ahead, drop buffered latency and re-lock near real-time.
            const lead = playCursor - audioCtx.currentTime;
            if (lead > 1.0) {
              playCursor = audioCtx.currentTime + 0.3;
            }
          } catch (err) {
            setStatus(`Audio loop error: ${err.message}`);
            await new Promise((r) => setTimeout(r, 80));
          }
        }
        audioLoopActive = false;
      }

      async function statusLoop() {
        while (true) {
          try {
            const s = await fetchJsonWithTimeout("/api/radio/status", {}, 1500);
            running = !!s.running;
            setToggleUi();
            if (running) {
              localStorage.setItem(RESUME_KEY, "1");
              syncGainFromStatus(s);
              if (!isEditingFrequency()) {
                freqEl.value = Number(s.freq_mhz || freqEl.value).toFixed(1);
                syncDial();
              }
              resumePending = !(await tryEnsureAudio());
              audioLoop();
            } else {
              resumePending = false;
              localStorage.removeItem(RESUME_KEY);
            }
            if (s.running) {
              if (resumePending) {
                setResumeStatus();
              } else {
                setStatus(`Streaming FM at ${Number(s.freq_mhz).toFixed(1)} MHz | LNA ${s.lna_gain_db} dB | VGA ${s.vga_gain_db} dB`);
              }
            } else {
              setStatus("Stopped.");
            }
            renderRds(s);
          } catch (_) {}
          await new Promise((r) => setTimeout(r, 1000));
        }
      }

      async function syncStatusOnce() {
        try {
          await fetchJsonWithTimeout("/api/radio/attach-existing", { method: "POST" }, 1800).catch(() => ({}));
          const s = await fetchJsonWithTimeout("/api/radio/status", {}, 1500);
          running = !!s.running;
          setToggleUi();
          if (running) {
            localStorage.setItem(RESUME_KEY, "1");
            syncGainFromStatus(s);
            freqEl.value = Number(s.freq_mhz || freqEl.value).toFixed(1);
            syncDial();
            if (s.device_id) {
              deviceEl.value = s.device_id;
            }
            setToggleUi();
            resumePending = !(await tryEnsureAudio());
            audioLoop();
            if (resumePending) {
              setResumeStatus();
            } else {
              setStatus(`Streaming FM at ${Number(s.freq_mhz).toFixed(1)} MHz | LNA ${s.lna_gain_db} dB | VGA ${s.vga_gain_db} dB`);
            }
          } else {
            localStorage.removeItem(RESUME_KEY);
            setStatus("Idle.");
          }
        } catch (_) {
          setStatus("Idle. Press Start Listening.");
          running = false;
          setToggleUi();
        }
      }

      async function tuneNow() {
        try {
          syncDial();
          const freq = Number(freqEl.value);
          if (!Number.isFinite(freq) || freq < 76 || freq > 108) {
            setStatus("Enter a valid FM frequency.");
            return;
          }
          const stages = gainToStages(rxGainEl.value);
          const payload = {
            device_id: deviceEl.value,
            freq_mhz: freq,
            sample_rate_sps: 2000000,
            lna_gain_db: stages.lna,
            vga_gain_db: stages.vga,
          };
          const resp = await fetch("/api/radio/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || data.error || "start failed");
          running = true;
          localStorage.setItem(RESUME_KEY, "1");
          resumePending = !(await tryEnsureAudio());
          audioLoop();
          bufferedStarts = 0;
          addHistory(payload.freq_mhz);
          if (data.lna_gain_db !== undefined && data.vga_gain_db !== undefined) {
            rxGainEl.value = stagesToGain(data.lna_gain_db, data.vga_gain_db);
          }
          setGainUi();
          const acceptedStages = gainToStages(rxGainEl.value);
          if (resumePending) {
            setResumeStatus();
          } else {
            setStatus(`Streaming FM at ${payload.freq_mhz.toFixed(1)} MHz | LNA ${acceptedStages.lna} dB | VGA ${acceptedStages.vga} dB`);
          }
          setToggleUi();
        } catch (err) {
          setStatus(`Start failed: ${err.message}`);
        }
      }

      async function stopNow() {
        running = false;
        localStorage.removeItem(RESUME_KEY);
        await fetch("/api/radio/stop", { method: "POST" });
        setStatus("Stopped.");
        setToggleUi();
      }

      toggleBtn.onclick = async () => {
        if (running) await stopNow();
        else await tuneNow();
      };

      window.addEventListener("pointerdown", async () => {
        if (!resumePending || !running) return;
        await resumeAudioNow();
      }, { passive: true });

      window.addEventListener("beforeunload", () => {
        if (running) localStorage.setItem(RESUME_KEY, "1");
      });

      window.addEventListener("pageshow", () => {
        if (localStorage.getItem(RESUME_KEY) === "1") {
          tryEnsureAudio();
          syncStatusOnce();
        }
      });

      freqEl.addEventListener("keydown", async (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          await tuneNow();
        }
      });

      freqEl.addEventListener("input", syncDial);
      volumeEl.addEventListener("input", () => {
        setVolumeUi();
        saveVolume();
        if (gainNode) gainNode.gain.value = Number(volumeEl.value);
      });
      spectrumModeBtn.addEventListener("click", () => {
        chartMode = "spectrum";
        spectrumModeBtn.classList.add("active");
        waveModeBtn.classList.remove("active");
      });
      waveModeBtn.addEventListener("click", () => {
        chartMode = "waveform";
        waveModeBtn.classList.add("active");
        spectrumModeBtn.classList.remove("active");
      });
      rxGainEl.addEventListener("input", setGainUi);
      rxGainEl.addEventListener("change", applyGainIfRunning);
      syncDial();
      loadSavedVolume();
      setGainUi();
      drawMiniSpec();
      async function initPage() {
        loadHistory();
        setToggleUi();
        setStatus("Loading devices...");
        try {
          await loadDevices();
        } catch (_) {
          setStatus("Could not load SDR devices.");
        }
        setStatus("Checking existing stream...");
        await syncStatusOnce();
        statusLoop();
      }

      initPage();
    </script>
  </body>
</html>
